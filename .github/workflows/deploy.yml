name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohanv2110/sl-vendor-management-platform
  DEPLOY_HOST: 34.122.29.156
  DEPLOY_USER: node
  DEPLOY_PATH: /home/node/docker-stack/SL-Vendor-Management-Platform
  PROD_URL: https://portal.sugarandleather.com
  GCP_PROJECT: shining-relic-494616-t5
  GCP_ZONE: us-central1-a
  GCP_INSTANCE: rohan-noble-vm

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  deploy:
    needs: test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: ver
        run: echo "version=$(cat VERSION 2>/dev/null || echo 0.0.0.0)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- IAP deploy (preferred; works when port 22 is closed to the internet) ---
      - name: Authenticate to Google Cloud
        if: ${{ secrets.GCP_DEPLOY_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_SA_KEY }}

      - name: Setup gcloud
        if: ${{ secrets.GCP_DEPLOY_SA_KEY != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify IAP SSH access
        if: ${{ secrets.GCP_DEPLOY_SA_KEY != '' }}
        run: |
          for attempt in 1 2 3; do
            if gcloud compute ssh "${DEPLOY_USER}@${GCP_INSTANCE}" \
              --project="${GCP_PROJECT}" \
              --zone="${GCP_ZONE}" \
              --tunnel-through-iap \
              --quiet \
              --command="echo deploy-ssh-ok"; then
              echo "IAP SSH OK (attempt $attempt)"
              exit 0
            fi
            echo "IAP SSH attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Deploy via IAP
        if: ${{ secrets.GCP_DEPLOY_SA_KEY != '' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gcloud compute scp scripts/remote-deploy.sh \
            "${DEPLOY_USER}@${GCP_INSTANCE}:~/remote-deploy.sh" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet
          gcloud compute ssh "${DEPLOY_USER}@${GCP_INSTANCE}" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command="chmod +x ~/remote-deploy.sh && DEPLOY_PATH='${DEPLOY_PATH}' IMAGE='${IMAGE}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' ~/remote-deploy.sh"

      # --- Direct SSH deploy (fallback; requires port 22 open to GitHub runners) ---
      - name: Setup SSH agent
        if: ${{ secrets.GCP_DEPLOY_SA_KEY == '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH for deploy
        if: ${{ secrets.GCP_DEPLOY_SA_KEY == '' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy-prod
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            BatchMode yes
            ConnectTimeout 25
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify direct SSH access
        if: ${{ secrets.GCP_DEPLOY_SA_KEY == '' }}
        run: |
          echo "::warning::GCP_DEPLOY_SA_KEY not set — using direct SSH. Run ./scripts/setup-gcp-github-deploy.sh for reliable IAP deploy."
          for attempt in 1 2 3 4 5; do
            if ssh deploy-prod "echo deploy-ssh-ok"; then
              echo "SSH OK (attempt $attempt)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Direct SSH to ${DEPLOY_HOST} failed (port 22 likely blocked)."
          echo "Run on your Mac: gcloud auth login && ./scripts/setup-gcp-github-deploy.sh"
          echo "Or open port 22: ./scripts/gcp-open-port-22.sh"
          exit 1

      - name: Deploy via direct SSH
        if: ${{ secrets.GCP_DEPLOY_SA_KEY == '' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ssh deploy-prod bash -s <<EOF
            set -euo pipefail
            export DEPLOY_PATH="${DEPLOY_PATH}"
            export IMAGE="${IMAGE}"
            export GHCR_USER="${GHCR_USER}"
            export GHCR_TOKEN="${GHCR_TOKEN}"
            cd "\$DEPLOY_PATH"
            git fetch --quiet origin main && git pull --ff-only origin main
            echo "\$GHCR_TOKEN" | docker login ghcr.io -u "\$GHCR_USER" --password-stdin
            docker pull "\$IMAGE"
            export VMS_APP_IMAGE="\$IMAGE"
            docker compose up -d --no-build vms-app
            docker image prune -f
          EOF

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$PROD_URL/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              echo "Production responding (HTTP $code) after $((i*5))s"
              exit 0
            fi
            echo "Waiting for $PROD_URL ... attempt $i/30 (HTTP $code)"
            sleep 5
          done
          echo "Production failed health check after 150s"
          exit 1
