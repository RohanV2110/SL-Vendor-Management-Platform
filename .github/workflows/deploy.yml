name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohanv2110/sl-vendor-management-platform
  DEPLOY_USER: node
  DEPLOY_PATH: /home/node/docker-stack/SL-Vendor-Management-Platform
  PROD_URL: https://portal.sugarandleather.com
  GCP_PROJECT: shining-relic-494616-t5
  GCP_ZONE: us-central1-a
  GCP_INSTANCE: rohan-noble-vm
  DEPLOY_HOST: 35.239.155.232
  GCP_DEPLOY_SA_EMAIL: github-vms-deploy@shining-relic-494616-t5.iam.gserviceaccount.com
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/156522544148/locations/global/workloadIdentityPools/github/providers/github

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  deploy:
    needs: test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: ver
        run: echo "version=$(cat VERSION 2>/dev/null || echo 0.0.0.0)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify SSH access
        id: ssh
        run: |
          set -e
          for attempt in 1 2 3; do
            if gcloud compute ssh "${GCP_INSTANCE}" \
              --project="${GCP_PROJECT}" \
              --zone="${GCP_ZONE}" \
              --tunnel-through-iap \
              --quiet \
              --command="echo deploy-ssh-ok"; then
              echo "IAP SSH OK (attempt $attempt)"
              echo "method=iap" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "IAP SSH attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::IAP SSH failed and DEPLOY_SSH_KEY is not set."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "echo deploy-ssh-ok"; then
              echo "Direct SSH OK (attempt $attempt)"
              echo "method=direct" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Direct SSH attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Both IAP and direct SSH failed."
          exit 1

      - name: Deploy via IAP
        if: steps.ssh.outputs.method == 'iap'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REMOTE_SCRIPT=/tmp/vms-remote-deploy.sh
          gcloud compute scp scripts/remote-deploy.sh \
            "${GCP_INSTANCE}:${REMOTE_SCRIPT}" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet
          gcloud compute ssh "${GCP_INSTANCE}" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command="DEPLOY_PATH='${DEPLOY_PATH}' IMAGE='${IMAGE}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' bash ${REMOTE_SCRIPT}"

      - name: Deploy via direct SSH
        if: steps.ssh.outputs.method == 'direct'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REMOTE_SCRIPT=/tmp/vms-remote-deploy.sh
          scp -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            scripts/remote-deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_SCRIPT}"
          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' IMAGE='${IMAGE}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' bash ${REMOTE_SCRIPT}"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$PROD_URL/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              echo "Production responding (HTTP $code) after $((i*5))s"
              exit 0
            fi
            echo "Waiting for $PROD_URL ... attempt $i/30 (HTTP $code)"
            sleep 5
          done
          echo "Production failed health check after 150s"
          exit 1
