name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohanv2110/sl-vendor-management-platform
  DEPLOY_HOST: 34.122.29.156
  DEPLOY_USER: node
  DEPLOY_PATH: /home/node/docker-stack/SL-Vendor-Management-Platform
  PROD_URL: https://portal.sugarandleather.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  deploy:
    needs: test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Print deploy workflow provenance
        run: |
          echo "Workflow ref: $GITHUB_WORKFLOW_REF"
          echo "Workflow SHA: $GITHUB_SHA"
          echo "Deploy host: $DEPLOY_HOST"

      - name: Read app version
        id: ver
        run: echo "version=$(cat VERSION 2>/dev/null || echo 0.0.0.0)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH for deploy
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          # Keep host key learning tied to the actual SSH session. ssh-keyscan often
          # fails from hosted runners even when a real SSH connection succeeds.
          cat >> ~/.ssh/config <<EOF
          Host deploy-prod
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            BatchMode yes
            ConnectTimeout 25
            ServerAliveInterval 15
            ServerAliveCountMax 3
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify SSH access
        run: |
          for attempt in 1 2 3 4 5; do
            if ssh deploy-prod "echo deploy-ssh-ok"; then
              echo "SSH OK (attempt $attempt)"
              exit 0
            fi
            echo "SSH attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::SSH to ${DEPLOY_USER}@${DEPLOY_HOST} failed after 5 attempts (often: firewall or sshd not completing banner)."
          echo "On the VM: sudo systemctl status ssh && sudo ss -tlnp | grep ':22'"
          echo "GCP: allow tcp:22 on the VM's VPC firewall (GitHub runners use changing IPs — see https://api.github.com/meta actions[])."
          echo "Ensure DEPLOY_SSH_KEY public key is in ~node/.ssh/authorized_keys on ${DEPLOY_HOST}."
          echo "Last connection trace:"
          ssh -vvv -o ConnectTimeout=15 deploy-prod "true" 2>&1 | tail -40 || true
          exit 1

      - name: Deploy to server
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ssh deploy-prod bash -s <<EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"
            echo "[deploy] Updating checkout"
            git fetch --quiet origin main
            git pull --ff-only origin main
            echo "[deploy] Logging in to ghcr.io"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            echo "[deploy] Pulling image: $IMAGE"
            docker pull "$IMAGE"
            echo "[deploy] Restarting vms-app"
            export VMS_APP_IMAGE="$IMAGE"
            docker compose up -d --no-build vms-app
            echo "[deploy] Pruning old images"
            docker image prune -f
          EOF

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$PROD_URL/" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              echo "Production responding (HTTP $code) after $((i*5))s"
              exit 0
            fi
            echo "Waiting for $PROD_URL ... attempt $i/30 (HTTP $code)"
            sleep 5
          done
          echo "Production failed health check after 150s"
          exit 1
