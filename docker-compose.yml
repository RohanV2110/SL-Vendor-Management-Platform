services:
  vms-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${VMS_APP_IMAGE:-vms-app:local}
    restart: unless-stopped
    mem_limit: 1536m
    memswap_limit: 2g
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Shared Postgres instance lives in the aries-app stack on the
      # docker-stack network. VMS gets its own database (VMS_DB_NAME) inside
      # that instance — separate database, same volume.
      DB_HOST: ${VMS_DB_HOST:-postgres}
      DB_PORT: ${VMS_DB_PORT:-5432}
      DB_USER: ${VMS_DB_USER:?VMS_DB_USER is required}
      DB_PASSWORD: ${VMS_DB_PASSWORD:?VMS_DB_PASSWORD is required}
      DB_NAME: ${VMS_DB_NAME:-sugarleather_vms}
      DB_SCHEMA: ${VMS_DB_SCHEMA:-public}
      POSTGRES_ADMIN_DB: ${VMS_POSTGRES_ADMIN_DB:-postgres}
      DATABASE_URL: ${VMS_DATABASE_URL:-}
      NEXTAUTH_URL: ${VMS_NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${VMS_NEXTAUTH_SECRET:?VMS_NEXTAUTH_SECRET is required}
      APP_BASE_URL: ${VMS_APP_BASE_URL:-http://localhost:3001}
      UPLOAD_DIR: /app/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-partners@sugarleather.ai}
      ARIES_WEBHOOK_SECRET: ${ARIES_WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_CONNECT_REFRESH_URL: ${VMS_STRIPE_CONNECT_REFRESH_URL:-http://localhost:3001/partner/dashboard}
      STRIPE_CONNECT_RETURN_URL: ${VMS_STRIPE_CONNECT_RETURN_URL:-http://localhost:3001/partner/dashboard}
    ports:
      - "${VMS_PORT:-3001}:3000"
    volumes:
      - uploads:/app/uploads
    command: ./scripts/docker-init-and-start.sh
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docker_stack

volumes:
  uploads:

networks:
  docker_stack:
    external: true
    name: docker-stack
